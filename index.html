  .redflag-q{border:1px solid var(--line2);border-radius:11px;padding:13px 15px;margin-bottom:10px;background:#fff}
  .redflag-q .q{font-weight:600;font-size:.92rem;margin-bottom:8px}

  /* slider */

  .edu-layout{display:grid;grid-template-columns:230px 1fr;gap:34px}

  .breath-ring{width:170px;height:170px;border-radius:50%;margin:10px auto;display:flex;align-items:center;justify-content:center;

  @media (prefers-reduced-motion: reduce){.breath-ring{animation:none}}
</style>

"use strict";
/* ============================================================
   GULF ECG DIARY — static GitHub Pages prototype
   Design & educational content adapted from the owner's
   OpenPalp / London Cardiology Clinic programme.
   No real payments, no real PHI. State lives in this browser.
   ============================================================ */

const CFG={MIN:1,MAX:149,MAX_UPLOADS:20,DIARY_DAYS:7,MONTHLY_CAP:1000};

/* ---------- Education content (bilingual) ---------- */
/* Adapted from the owner's own OpenPalp material; UK-specific terms
   (999 / NHS) replaced with Gulf-appropriate wording per spec. */
const EDU=[
 {id:'understanding',icon:'🫀',
  en:{teaser:'Why your heart skips, flutters or races — and why it is usually harmless.',title:'Understanding palpitations',
  html:`<p class="lead">The sensation of your heart skipping a beat, fluttering in your chest, or suddenly racing can be alarming — but in the majority of people with no underlying heart disease, palpitations are a benign nuisance rather than a warning sign.</p>
  <p>Most people find that their palpitations come and go unpredictably, and that uncertainty is itself distressing. The aim of an ECG diary is simple: to capture what your heart is actually doing at the moment you feel it, so that uncertainty can be replaced with understanding.</p>
  <div class="note good"><b>You are not alone.</b> Palpitations are one of the most common reasons people see a cardiologist. Many palpitations are distressing but not dangerous.</div>`},
  ar:{teaser:'لماذا يرفرف قلبك أو يتسارع — ولماذا يكون غالباً غير ضار.',title:'فهم الخفقان',
  html:`<p class="lead">قد يكون الإحساس بأن قلبك يفوّت نبضة أو يرفرف في صدرك أو يتسارع فجأة مقلقاً — لكن لدى غالبية الأشخاص الذين لا يعانون من مرض قلبي كامن، يكون الخفقان إزعاجاً حميداً وليس علامة تحذير.</p>
  <p>يجد معظم الناس أن الخفقان يأتي ويذهب على نحوٍ غير متوقّع، وهذا الغموض بحدّ ذاته مزعج. وهدف مذكرة تخطيط القلب بسيط: التقاط ما يفعله قلبك فعلاً في اللحظة التي تشعر بها، لكي يحلّ الفهم محلّ الغموض.</p>
  <div class="note good"><b>لست وحدك.</b> الخفقان من أكثر الأسباب شيوعاً لزيارة طبيب القلب. كثير من حالات الخفقان مزعجة لكنها ليست خطيرة.</div>`}},

 {id:'triggers',icon:'☕',
  en:{teaser:'The everyday things that set palpitations off.',title:'Common triggers',
  html:`<p>Palpitations rarely come from nowhere. The most common everyday triggers are simple and often within your control:</p>
  <div class="grid cols-3">
    ${['Caffeine','Poor sleep','Stress and anxiety','Alcohol','Dehydration','Hormonal changes'].map(x=>`<div class="card" style="padding:16px;text-align:center"><b>${x}</b></div>`).join('')}
  </div>
  <p style="margin-top:16px">A diary helps you connect what you felt with what you were doing — turning a vague worry into a pattern you can act on.</p>`},
  ar:{teaser:'الأشياء اليومية التي تثير الخفقان.',title:'المحفّزات الشائعة',
  html:`<p>نادراً ما يأتي الخفقان من العدم. أكثر المحفّزات اليومية شيوعاً بسيطة وغالباً ضمن سيطرتك:</p>
  <div class="grid cols-3">
    ${['الكافيين','قلة النوم','التوتر والقلق','الكحول','الجفاف','التغيّرات الهرمونية'].map(x=>`<div class="card" style="padding:16px;text-align:center"><b>${x}</b></div>`).join('')}
  </div>
  <p style="margin-top:16px">تساعدك المذكرة على ربط ما شعرت به بما كنت تفعله — لتحويل قلق غامض إلى نمط يمكنك التعامل معه.</p>`}},

 {id:'attention-loop',icon:'🔁',
  en:{teaser:'The more you watch your heartbeat, the more you find.',title:'The attention loop',
  html:`<p class="lead">The more you monitor your heartbeat, the more you find it — until you learn not to look.</p>
  <p>Many people fall into a self-reinforcing cycle. Understanding the loop is the first step to breaking it:</p>
  ${loopDiagram('en')}
  <p style="margin-top:14px">Capturing a few clear ECG traces — and being told what they actually show — gives the reassurance that quietens the loop, so attention can return to normal life.</p>`},
  ar:{teaser:'كلما راقبت نبض قلبك أكثر، وجدته أكثر.',title:'حلقة الانتباه',
  html:`<p class="lead">كلما راقبت نبض قلبك أكثر، وجدته أكثر — إلى أن تتعلّم ألا تنظر.</p>
  <p>يقع كثير من الناس في دورة تغذّي نفسها. فهم الحلقة هو الخطوة الأولى لكسرها:</p>
  ${loopDiagram('ar')}
  <p style="margin-top:14px">التقاط بضع تخطيطات واضحة — ومعرفة ما تظهره فعلاً — يمنح الطمأنينة التي تهدّئ الحلقة، فيعود الانتباه إلى الحياة الطبيعية.</p>`}},

 {id:'breathing',icon:'🌬️',
  en:{teaser:'Five minutes, twice a day. Your rhythm can shift within one session.',title:'The 4–6 breathing technique',
  html:`<p>Slow breathing is one of the simplest evidence-based tools for a calmer heart rhythm. The pattern is easy to remember:</p>
  ${breathBlock('en')}
  <ul class="clean"><li><b>Breathe in for 4 seconds.</b></li><li><b>Breathe out for 6 seconds.</b></li><li>Repeat five times. Do this for about five minutes, twice a day.</li></ul>
  <p>The longer out-breath gently activates your vagus nerve, the body's natural "brake" on heart rate.</p>
  <div class="evidence"><b>What the evidence shows:</b> across breathing studies, heart-rate variability improved — not after weeks of practice, but within the same session, within minutes.</div>`},
  ar:{teaser:'خمس دقائق مرتين يومياً. قد يتغيّر نظمك خلال جلسة واحدة.',title:'تقنية التنفّس 4–6',
  html:`<p>التنفّس البطيء من أبسط الأدوات المبنية على الأدلة لنظم قلب أهدأ. النمط سهل التذكّر:</p>
  ${breathBlock('ar')}
  <ul class="clean"><li><b>شهيق لمدة 4 ثوانٍ.</b></li><li><b>زفير لمدة 6 ثوانٍ.</b></li><li>كرّر خمس مرات. افعل ذلك نحو خمس دقائق، مرتين يومياً.</li></ul>
  <p>الزفير الأطول ينشّط العصب المبهم بلطف، وهو "مكبح" الجسم الطبيعي لمعدّل ضربات القلب.</p>
  <div class="evidence"><b>ما تظهره الأدلة:</b> عبر دراسات التنفّس، تحسّن تغيّر معدّل ضربات القلب — ليس بعد أسابيع من التمرين، بل خلال الجلسة نفسها وفي دقائق.</div>`}},

 {id:'when-it-happens',icon:'🆘',
  en:{teaser:'A calm, ordered response for the moment it strikes.',title:'When you feel palpitations',
  html:`<div class="note danger"><b>Safety first.</b> If you feel faint, develop chest pain, or have a sustained fast heart rate that does not settle after 15–20 minutes, stop and contact your local emergency services or nearest emergency department immediately.</div>
  <div class="journey" style="margin-top:18px">
    ${stepRow('1','Stay calm','Anxiety amplifies palpitations. Take one slow breath and remind yourself: most palpitations are not dangerous. You are not in danger.')}
    ${stepRow('2','Sit or lie down','Reduce demand on your heart. Do not continue strenuous activity until the episode has fully passed.')}
    ${stepRow('3','Breathe slowly','4 seconds in, 6 seconds out. Repeat five times. This activates your vagus nerve and can help settle the heart.')}
    ${stepRow('4','Try a vagal technique','If you feel safe to do so: bear down gently as if straining (Valsalva), or splash cold water on your face — only if you feel well enough.')}
    ${stepRow('5','Record your ECG','As quickly as possible. Even if symptoms are settling, record anyway — a trace during or just after an episode is highly informative.')}
    ${stepRow('6','Note it in your diary','Time, duration, severity, what you were doing, what helped. The pattern across your diary is where the answers live.')}
  </div>`},
  ar:{teaser:'استجابة هادئة ومرتّبة للحظة حدوثه.',title:'عندما تشعر بالخفقان',
  html:`<div class="note danger"><b>السلامة أولاً.</b> إذا شعرت بدوار أو ظهر لديك ألم في الصدر أو استمر تسارع ضربات القلب دون أن يهدأ بعد 15–20 دقيقة، توقّف واتصل بخدمات الطوارئ المحلية أو أقرب قسم طوارئ فوراً.</div>
  <div class="journey" style="margin-top:18px">
    ${stepRow('1','ابقَ هادئاً','القلق يضخّم الخفقان. خذ نفساً بطيئاً وذكّر نفسك: معظم حالات الخفقان ليست خطيرة. أنت لست في خطر.')}
    ${stepRow('2','اجلس أو استلقِ','قلّل الجهد على قلبك. لا تواصل النشاط الشاق حتى تمرّ النوبة تماماً.')}
    ${stepRow('3','تنفّس ببطء','شهيق 4 ثوانٍ، زفير 6 ثوانٍ. كرّر خمس مرات. هذا ينشّط العصب المبهم وقد يساعد على تهدئة القلب.')}
    ${stepRow('4','جرّب تقنية مبهمية','إن شعرت بالأمان: اضغط بلطف كأنك تجهد (مناورة فالسالفا)، أو رشّ ماءً بارداً على وجهك — ولا تفعل ذلك إلا إن كنت على ما يُرام.')}
    ${stepRow('5','سجّل تخطيطك','بأسرع ما يمكن. حتى لو كانت الأعراض تهدأ، سجّل على أي حال — فالتخطيط أثناء النوبة أو بعدها مباشرة مفيد جداً.')}
    ${stepRow('6','دوّنه في مذكرتك','الوقت والمدة والشدة وما كنت تفعله وما الذي ساعد. وفي النمط الذي يظهر عبر مذكرتك تكمن الإجابات.')}
  </div>`}},

 {id:'vagal',icon:'🧊',
  en:{teaser:'Simple manoeuvres that can settle a fast rhythm — used safely.',title:'Vagal techniques, used safely',
  html:`<p>Vagal manoeuvres can sometimes settle a fast regular rhythm. They are simple, but they are not for everyone.</p>
  <ul class="clean"><li><b>Valsalva:</b> bear down gently as if straining, for about 15 seconds.</li><li><b>Cold stimulus:</b> splash cold water on your face.</li></ul>
  <div class="note warn"><b>Use them safely.</b> Always sit or lie down first. They are not suitable if you have known eye disease or significant heart-valve problems. Do not press on your neck (carotid massage). If symptoms worsen during any technique, stop immediately. If you feel very unwell or develop chest pain, do not attempt them — contact your local emergency services.</div>`},
  ar:{teaser:'مناورات بسيطة قد تهدّئ النظم السريع — بأمان.',title:'التقنيات المبهمية بأمان',
  html:`<p>قد تساعد المناورات المبهمية أحياناً على تهدئة نظم سريع منتظم. وهي بسيطة لكنها ليست مناسبة للجميع.</p>
  <ul class="clean"><li><b>فالسالفا:</b> اضغط بلطف كأنك تجهد، لنحو 15 ثانية.</li><li><b>منبّه بارد:</b> رشّ ماءً بارداً على وجهك.</li></ul>
  <div class="note warn"><b>استخدمها بأمان.</b> اجلس أو استلقِ أولاً دائماً. ليست مناسبة إن كان لديك مرض في العين أو مشاكل كبيرة في صمامات القلب. لا تضغط على رقبتك (تدليك السباتي). إذا ساءت الأعراض أثناء أي تقنية، توقّف فوراً. إذا شعرت بتوعّك شديد أو ألم في الصدر، فلا تحاولها — واتصل بخدمات الطوارئ المحلية.</div>`}},

 {id:'sleep',icon:'😴',
  en:{teaser:'Disrupted sleep and heart rhythm are deeply connected.',title:'Sleep & your heart rhythm',
  html:`<p class="lead">Your sleep is not separate from your heart rhythm. It is part of it.</p>
  <p>The same heart, on a different night's sleep, can behave very differently. Disrupted sleep increases extra beats; protected, restorative sleep reduces them.</p>
  <div class="grid cols-2">
    <div class="card center"><div class="stat-num">+33%</div><p class="muted" style="margin:6px 0 0">more extra beats (PVCs) after disrupted sleep</p></div>
    <div class="card center"><div class="stat-num">−29%</div><p class="muted" style="margin:6px 0 0">lower risk of atrial fibrillation with healthy sleep patterns</p></div>
  </div>
  <div class="evidence"><b>Evidence:</b> a 2021 study in <i>JACC</i> followed 403,187 UK Biobank participants and found a 29% lower risk of atrial fibrillation in those with healthy sleep patterns.</div>`},
  ar:{teaser:'النوم المضطرب ونظم القلب مرتبطان بعمق.',title:'النوم ونظم قلبك',
  html:`<p class="lead">نومك ليس منفصلاً عن نظم قلبك. بل هو جزء منه.</p>
  <p>القلب نفسه، بعد ليلة نوم مختلفة، قد ينبض على نحوٍ مختلف تماماً. فالنوم المضطرب يزيد الضربات الزائدة، والنوم المريح يقلّلها.</p>
  <div class="grid cols-2">
    <div class="card center"><div class="stat-num">+33%</div><p class="muted" style="margin:6px 0 0">ضربات زائدة أكثر بعد النوم المضطرب</p></div>
    <div class="card center"><div class="stat-num">−29%</div><p class="muted" style="margin:6px 0 0">خطر أقل للرجفان الأذيني مع أنماط نوم صحية</p></div>
  </div>
  <div class="evidence"><b>الأدلة:</b> تابعت دراسة عام 2021 في مجلة <i>JACC</i> عدد 403,187 مشاركاً من UK Biobank ووجدت انخفاضاً بنسبة 29% في خطر الرجفان الأذيني لدى أصحاب أنماط النوم الصحية.</div>`}},

 {id:'alcohol',icon:'🍷',
  en:{teaser:'Cutting back has a measurable effect on rhythm.',title:'Alcohol & atrial fibrillation',
  html:`<p>Alcohol is one of the best-studied lifestyle triggers for atrial fibrillation — and one of the most modifiable.</p>
  <div class="card center"><div class="stat-num">−45%</div><p class="muted" style="margin:6px 0 0">AF recurrence in people who stopped drinking</p></div>
  <div class="evidence"><b>Evidence:</b> in the first randomised trial of alcohol abstinence for AF, patients who stopped drinking reduced their AF recurrence by 45%. Even moderate regular drinking (10+ drinks per week) has measurable cardiac effects.</div>`},
  ar:{teaser:'التقليل له أثر ملموس على النظم.',title:'الكحول والرجفان الأذيني',
  html:`<p>الكحول من أكثر محفّزات نمط الحياة دراسةً للرجفان الأذيني — ومن أكثرها قابلية للتعديل.</p>
  <div class="card center"><div class="stat-num">−45%</div><p class="muted" style="margin:6px 0 0">تكرار الرجفان لدى من توقّفوا عن الشرب</p></div>
  <div class="evidence"><b>الأدلة:</b> في أول تجربة عشوائية للامتناع عن الكحول في الرجفان الأذيني، خفّض المرضى الذين توقّفوا عن الشرب تكرار الرجفان بنسبة 45%. وحتى الشرب المعتدل المنتظم (10 مشروبات أو أكثر أسبوعياً) له آثار قلبية ملموسة.</div>`}},

 {id:'weight-movement',icon:'🏃',
  en:{teaser:'A heart that moves less, fires irregularly more.',title:'Weight, movement & rhythm',
  html:`<p class="lead">The heart that moves less, fires irregularly more.</p>
  <p>Body weight and regular movement both shape how stable your rhythm is.</p>
  <div class="grid cols-2">
    <div class="card center"><div class="stat-num">+33%</div><p class="muted" style="margin:6px 0 0">more likely to have extra ventricular beats with obesity (and +4% per BMI unit)</p></div>
    <div class="card center"><div class="stat-num">−30%</div><p class="muted" style="margin:6px 0 0">AF recurrence with exercise-based cardiac rehabilitation</p></div>
  </div>
  <div class="evidence"><b>Evidence:</b> a Cochrane systematic review found exercise-based cardiac rehabilitation reduces AF recurrence by about 30%.</div>`},
  ar:{teaser:'القلب الذي يتحرّك أقل، ينبض بعدم انتظام أكثر.',title:'الوزن والحركة والنظم',
  html:`<p class="lead">القلب الذي يتحرّك أقل، ينبض بعدم انتظام أكثر.</p>
  <p>يؤثّر وزنُ الجسم والحركةُ المنتظمة معاً في مدى استقرار نظمك.</p>
  <div class="grid cols-2">
    <div class="card center"><div class="stat-num">+33%</div><p class="muted" style="margin:6px 0 0">احتمال أكبر للضربات البطينية الزائدة مع السمنة (و+4% لكل وحدة من مؤشّر كتلة الجسم)</p></div>
    <div class="card center"><div class="stat-num">−30%</div><p class="muted" style="margin:6px 0 0">تكرار الرجفان مع إعادة التأهيل القلبي القائم على التمرين</p></div>
  </div>
  <div class="evidence"><b>الأدلة:</b> وجدت مراجعة منهجية من Cochrane أن إعادة التأهيل القلبي القائم على التمرين تقلّل تكرار الرجفان بنحو 30%.</div>`}},

 {id:'omega3',icon:'💊',
  en:{teaser:'A common supplement that may work against your rhythm.',title:'Omega-3 supplements: a caution',
  html:`<div class="note warn"><b>Worth knowing:</b> high-dose omega-3 fish-oil <i>supplements</i> have been linked to a higher risk of atrial fibrillation.</div>
  <div class="grid cols-2" style="margin-top:14px">
    <div class="card center"><div class="stat-num">+25%</div><p class="muted" style="margin:6px 0 0">higher AF risk with omega-3 supplements</p></div>
    <div class="card center"><div class="stat-num">+49%</div><p class="muted" style="margin:6px 0 0">at doses above 1 g per day</p></div>
  </div>
  <p style="margin-top:14px">If you take omega-3 supplements for your heart, the evidence suggests they may be working against your rhythm, not for it. <b>Eating fish as part of your diet does not carry this risk.</b> Always discuss supplements with your own doctor before changing anything.</p>`},
  ar:{teaser:'مكمّل شائع قد يعمل ضد نظمك.',title:'مكمّلات أوميغا-3: تنبيه',
  html:`<div class="note warn"><b>من المفيد معرفته:</b> ارتبطت <i>مكمّلات</i> زيت السمك أوميغا-3 بجرعات عالية بخطر أعلى للرجفان الأذيني.</div>
  <div class="grid cols-2" style="margin-top:14px">
    <div class="card center"><div class="stat-num">+25%</div><p class="muted" style="margin:6px 0 0">خطر رجفان أعلى مع مكمّلات أوميغا-3</p></div>
    <div class="card center"><div class="stat-num">+49%</div><p class="muted" style="margin:6px 0 0">عند جرعات أكثر من 1 غرام يومياً</p></div>
  </div>
  <p style="margin-top:14px">إذا كنت تتناول مكمّلات أوميغا-3 من أجل قلبك، فالأدلة تشير إلى أنها قد تعمل ضد نظمك لا لصالحه. <b>أمّا تناول السمك ضمن نظامك الغذائي فلا يحمل هذا الخطر.</b> ناقش دائماً المكمّلات مع طبيبك قبل تغيير أي شيء.</p>`}},

 {id:'device',icon:'📱',
  en:{teaser:'Your heart’s voice recorder — how single-lead ECG works.',title:'Your single-lead ECG device',
  html:`<p>A single-lead ECG device — such as a KardiaMobile or an Apple Watch ECG — records a single-lead ECG in about 30 seconds. You use it whenever you feel symptoms, and once each morning at rest.</p>
  <p class="lead">Think of it as your heart's voice recorder — activated by you, at the moment that matters.</p>
  <h3>How to record a good trace</h3>
  <ul class="clean"><li>Rest your hands and follow your device's prompt (for a handheld, place each thumb on an electrode pad).</li><li>Hold still, breathe gently, and stay for the full 30 seconds.</li><li>The app saves and analyses the recording automatically.</li></ul>
  <div class="note info"><b>"Unclassified" is not failure.</b> It simply means the app's automatic reader could not classify the trace. A clinician can still review the raw recording directly — which is exactly what this service does. If the app shows "Possible Atrial Fibrillation" or another flagged result, do not panic: record it, note the time, and upload it.</div>
  <p class="muted" style="font-size:.86rem;margin-top:14px">Gulf ECG Diary is an independent service and is not endorsed by or affiliated with any device maker.</p>`},
  ar:{teaser:'مسجّل صوت قلبك — كيف يعمل التخطيط أحادي الاشتقاق.',title:'جهاز تخطيط القلب أحادي الاشتقاق',
  html:`<p>جهاز تخطيط أحادي الاشتقاق — مثل KardiaMobile أو تخطيط Apple Watch — يسجّل تخطيطاً أحادي الاشتقاق في نحو 30 ثانية. تستخدمه كلما شعرت بأعراض، ومرة كل صباح أثناء الراحة.</p>
  <p class="lead">اعتبره مسجّل صوت قلبك — تفعّله أنت في اللحظة المهمة.</p>
  <h3>كيف تسجّل تخطيطاً جيداً</h3>
  <ul class="clean"><li>أرِح يديك واتبع إرشاد جهازك (في الجهاز المحمول، ضع كل إبهام على لوح قطب).</li><li>ابقَ ثابتاً، وتنفّس بهدوء، وابقَ طوال الـ30 ثانية كاملة.</li><li>يحفظ التطبيق التسجيل ويحلّله تلقائياً.</li></ul>
  <div class="note info"><b>"غير مصنّف" ليس فشلاً.</b> يعني فقط أن القارئ الآلي للتطبيق لم يستطع تصنيف التخطيط. ويمكن للطبيب مع ذلك مراجعة التسجيل الخام مباشرة — وهو بالضبط ما تقدّمه هذه الخدمة. إذا أظهر التطبيق "رجفان أذيني محتمل" أو نتيجة أخرى، فلا تذعر: سجّله، ودوّن الوقت، وارفعه.</div>
  <p class="muted" style="font-size:.86rem;margin-top:14px">خدمة Gulf ECG Diary مستقلّة وغير معتمدة من أي جهة مصنّعة للأجهزة أو مرتبطة بها.</p>`}},

 {id:'conditions',icon:'📈',
  en:{teaser:'Ectopics, AF and SVT — what the words mean.',title:'Ectopics, AF & SVT explained',
  html:`<h3>Ectopic beats</h3><p>That skip, thud, or flutter is usually an ectopic beat — an early extra beat. In a healthy heart they are almost always harmless, even when they feel dramatic.</p>
  <h3>Atrial fibrillation (AF)</h3><p>AF is an irregular, often faster rhythm coming from the upper chambers. It matters because, untreated, it raises stroke risk — which is why catching it on a trace is valuable.</p>
  <h3>Supraventricular tachycardia (SVT)</h3><p>SVT is a sudden fast regular rhythm that starts and stops abruptly. It is usually not dangerous but can be very uncomfortable, and is often very treatable once identified.</p>
  <div class="note info">If a diary reveals atrial fibrillation, SVT, significant pauses, or a high burden of extra beats, the report will recommend a prompt onward referral to your local cardiology service.</div>`},
  ar:{teaser:'الضربات المنتبذة والرجفان وتسرّع SVT — ماذا تعني.',title:'الضربات المنتبذة والرجفان وSVT',
  html:`<h3>الضربات المنتبذة</h3><p>تلك "القفزة" أو "الخفقة" أو "الرفرفة" عادةً ما تكون ضربة منتبذة — ضربة زائدة مبكرة. في القلب السليم تكون غالباً غير ضارة، حتى عندما تبدو مزعجة.</p>
  <h3>الرجفان الأذيني (AF)</h3><p>الرجفان الأذيني نظم غير منتظم وغالباً أسرع، ينشأ من الحجرتين العلويتين. وهو مهمّ لأنه إن تُرك دون علاج رفع خطر السكتة — لذا فإن التقاطه على تخطيط أمرٌ قيّم.</p>
  <h3>تسرّع القلب فوق البطيني (SVT)</h3><p>هو نظم سريع منتظم يبدأ ويتوقّف فجأة. غالباً غير خطير لكنه قد يكون مزعجاً جداً، وكثيراً ما يكون قابلاً للعلاج بمجرد تحديده.</p>
  <div class="note info">إذا كشفت المذكرة عن رجفان أذيني أو SVT أو توقّفات مهمة أو عبء عالٍ من الضربات الزائدة، فسيوصي التقرير بإحالة عاجلة إلى خدمة طب القلب المحلية لديك.</div>`}},

 {id:'cast',icon:'📖',
  en:{teaser:'A landmark trial that changed how we treat extra beats.',title:'The lesson of the CAST trial',
  html:`<p>In 1989, a trial tested drugs that suppressed extra heartbeats after a heart attack — on the reasonable assumption that fewer extra beats would mean fewer deaths.</p>
  <p>The trial was stopped early. Patients taking the drug were dying at roughly three times the rate of those who took nothing.</p>
  <div class="evidence"><b>The lesson, which changed cardiology permanently:</b> extra heartbeats are often a signal, not always the problem. Silencing them without understanding them can be worse than leaving them alone.</div>
  <p>This is why a careful ECG diary — understanding before acting — matters more than chasing every beat.</p>`},
  ar:{teaser:'تجربة فارقة غيّرت طريقة علاجنا للضربات الزائدة.',title:'درس تجربة CAST',
  html:`<p>في عام 1989، اختبرت تجربة أدوية تكبح الضربات الزائدة بعد النوبة القلبية — بناءً على افتراضٍ معقول مفاده أن عدداً أقل من الضربات الزائدة يعني وفيات أقل.</p>
  <p>أُوقفت التجربة مبكراً. فقد كان المرضى الذين يتناولون الدواء يموتون بمعدّل يقارب ثلاثة أضعاف معدّل من لم يتناولوا الدواء.</p>
  <div class="evidence"><b>الدرس الذي غيّر طب القلب نهائياً:</b> الضربات الزائدة غالباً إشارة، وليست دائماً المشكلة نفسها. وإسكاتها دون فهمها قد يكون أسوأ من تركها.</div>
  <p>لهذا فإن مذكرة تخطيط دقيقة — الفهم قبل التصرّف — أهم من ملاحقة كل نبضة.</p>`}},
];

function closeMobileNav(){ document.getElementById('mobileNav').classList.add('hidden'); }

/* ---------- Dispatcher ---------- */
const app=()=>document.getElementById('app');
function render(){
  buildTopNav();

  const map={home:viewHome,'how-it-works':viewHow,learn:viewLearn,safety:viewSafety,faq:viewFAQ,

}

function submitEligibility(){
  const v=id=>document.getElementById(id).value;
  const required=['e_country','e_age','e_sex','e_symptom']; let ok=required.every(id=>v(id));
  const rf=[]; for(let i=0;i<I18N[lang].rf.length;i++){ const r=document.querySelector(`input[name=rf${i}]:checked`); if(!r)ok=false; rf.push(r?r.value:null); }
  const ex=[]; for(let i=0;i<I18N[lang].excl.length;i++){ const r=document.querySelector(`input[name=ex${i}]:checked`); if(!r)ok=false; ex.push(r?r.value:null); }
  if(!ok){ document.getElementById('eligErr').innerHTML=`<div class="note danger" style="margin-top:12px">${t('elig_need')}</div>`; return; }
  const ageNum=Number(v('e_age'));
  const anyFlag=rf.some(x=>x==='yes'); const anyExcl=ex.some(x=>x==='yes'); const underage=isFinite(ageNum)&&ageNum<18;
  let tag,eligible=false;
  if(anyFlag) tag='NOT_ELIGIBLE_EMERGENCY_ADVICE';
  else if(underage) tag='NOT_ELIGIBLE_UNDER_18';

      ${statCard(t('adm_avg_pay'),money(month.avgPay))}
      ${statCard(t('adm_rev_up'),money(month.revPerUpload))}
      ${statCard(t('adm_avg_up'),`${month.avgUploads}`)}
      ${statCard(t('adm_reports'),`${month.reports}`)}
      ${statCard(t('adm_qa'),`${month.qa}`)}
    </div>
    <h2>${t('adm_queue')}</h2>
    <div class="toolbar"><div class="seg" id="admFilter">${[['all','filter_all'],['awaiting','filter_awaiting'],['urgent','filter_urgent'],['done','filter_done']].map(([k,lab],i)=>`<button class="${i===0?'on':''}" onclick="setAdmFilter('${k}',this)">${t(lab)}</button>`).join('')}</div></div>
    <div class="table-wrap"><table id="queueTable"><thead><tr><th>${t('col_id')}</th><th>${t('col_country')}</th><th>${t('col_agesex')}</th><th>${t('col_amount')}</th><th>${t('col_ecgs')}</th><th>${t('col_status')}</th><th>${t('col_flag')}</th><th>${t('col_left')}</th><th>${t('col_action')}</th></tr></thead><tbody>${queueRows(all)}</tbody></table></div>
    ${all.length?'':`<p class="muted" style="margin-top:14px">${t('adm_no_episodes')}</p>`}
  </div>`;
}
function statCard(label,val,extra){ return `<div class="card stat"><div class="v">${val}</div><div class="l">${label}</div>${extra||''}</div>`; }
function monthMetrics(){
  const all=DB.episodes, paid=all.filter(e=>e.payment_status==='paid');
  const revenue=paid.reduce((s,e)=>s+Number(e.selected_amount_gbp||0),0);
  const totalUploads=all.reduce((s,e)=>s+e.uploads.length,0);
  return {revenue,active:all.filter(e=>e.status==='ACTIVE_DIARY').length,awaiting:all.filter(e=>['AWAITING_REVIEW','IN_REVIEW'].includes(e.status)).length,escalated:all.filter(e=>e.status==='ESCALATED'||e.escalated).length,avgPay:paid.length?(revenue/paid.length).toFixed(0):0,revPerUpload:totalUploads?(revenue/totalUploads).toFixed(1):0,avgUploads:all.length?(totalUploads/all.length).toFixed(1):0,reports:all.filter(e=>e.report&&e.report.signed_at).length,qa:all.filter(e=>e.qa_assigned).length};
}
function queueRows(list){
  if(!list.length) return '';
  return list.map(ep=>{ const el=ep.eligibility||{}; const flag=(ep.escalated||ep.red_flag)?`<span class="pill danger">${ico('flag',13)}</span>`:(ep.qa_assigned?`<span class="pill warn">QA</span>`:`<span class="pill neutral">—</span>`);
    return `<tr><td>${ep.id.slice(-6)}</td><td>${cName(el.country)}</td><td>${el.age||'—'} / ${(el.sex||'').slice(0,1).toUpperCase()}</td><td>${money(ep.selected_amount_gbp)}</td><td>${ep.uploads.length}</td><td><span class="pill ${ep.status==='ESCALATED'?'danger':(ep.status==='REPORT_READY'?'good':'neutral')}">${t('st_'+ep.status)||ep.status}</span></td><td>${flag}</td><td>${daysLeft(ep)}</td><td><button class="btn sm" onclick="go('admin','${ep.id}')">${t('adm_open')}</button></td></tr>`;
  }).join('');
}
function setAdmFilter(k,btn){
  document.querySelectorAll('#admFilter button').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  let list=DB.episodes;
  if(k==='awaiting') list=list.filter(e=>['AWAITING_REVIEW','IN_REVIEW'].includes(e.status));
  if(k==='urgent') list=list.filter(e=>e.status==='ESCALATED'||e.escalated);
  if(k==='done') list=list.filter(e=>e.report&&e.report.signed_at);
  document.querySelector('#queueTable tbody').innerHTML=queueRows(list);
}
function viewAdminLogin(){
  app().innerHTML=`<div class="wrap narrow" style="max-width:440px"><div class="card"><h1>${t('adm_login_h')}</h1><p class="muted">${t('adm_login_p')}</p><div class="field"><label class="f">Email</label><input type="email" id="adm_email" value="clinician@demo.local"></div><div class="field"><label class="f">Role</label><select id="adm_role"><option value="clinician">clinician</option><option value="admin">admin</option><option value="physiologist">physiologist</option></select></div><button class="btn block" onclick="DB.adminAuthed=true;DB.adminRole=document.getElementById('adm_role').value;save();render()">${t('adm_enter')}</button></div></div>`;
}
function viewAdminEpisode(epId){
  const ep=DB.episodes.find(e=>e.id===epId); if(!ep){ go('admin'); return; }
  const el=ep.eligibility||{}, r=ep.report||{};
  app().innerHTML=`<div class="wrap">
    <button class="btn sm ghost" onclick="go('admin')">← ${t('adm_back')}</button>
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px"><h1 style="margin:0">${ep.id.slice(-6)}</h1><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="pill ${ep.status==='ESCALATED'?'danger':'neutral'}">${t('st_'+ep.status)||ep.status}</span>${ep.red_flag?`<span class="pill danger">${ico('flag',13)} red-flag upload</span>`:''}</div></div>
    <div class="grid cols-2" style="margin:16px 0">
      <div class="card"><h3>${t('elig_h')}</h3><div class="kv"><div class="muted">${t('f_country')}</div><div>${cName(el.country)}</div><div class="muted">${t('f_age')} / ${t('f_sex')}</div><div>${el.age} / ${el.sex}</div><div class="muted">${t('f_symptom')}</div><div>${el.main_symptom}</div><div class="muted">${t('f_duration')}</div><div>${el.symptom_duration||'—'}</div><div class="muted">${t('f_freq')}</div><div>${el.symptom_frequency||'—'}</div><div class="muted">${t('f_device')}</div><div>${el.device_used||'—'}</div><div class="muted">${t('f_known')}</div><div>${el.known_heart_condition?t('yes'):t('no')}</div><div class="muted">${t('f_meds')}</div><div>${esc(el.current_medications)||'—'}</div></div>${el.symptom_description?`<p class="muted" style="margin-top:10px"><b>${t('f_desc')}:</b> ${esc(el.symptom_description)}</p>`:''}</div>
      <div class="card"><h3>${t('payp_buying_h')}</h3><div class="kv"><div class="muted">${t('payp_selected')}</div><div>${money(ep.selected_amount_gbp)}</div><div class="muted">${t('dash_start')}</div><div>${fmtDate(ep.diary_start_at)}</div><div class="muted">${t('dash_end')}</div><div>${fmtDate(ep.diary_end_at)}</div><div class="muted">${t('dash_uploads')}</div><div>${ep.uploads.length} / ${CFG.MAX_UPLOADS}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px"><button class="btn sm danger" onclick="escalate('${ep.id}')">${t('adm_escal_btn')}</button><button class="btn sm ghost" onclick="assignQA('${ep.id}')">${t('adm_assign_qa')}</button></div>${ep.qa_assigned?`<div class="note warn" style="margin-top:10px">QA: ${qaLabel(ep.qa_type)} — physiologist review queued.</div>`:''}</div>
    </div>
    <h2>${t('adm_ecgs_h')} (${ep.uploads.length})</h2>
    <div class="card" style="margin-bottom:18px">${ep.uploads.length?ep.uploads.map((u,i)=>ecgRow(ep,u,i)).join(''):`<p class="muted" style="margin:0">—</p>`}</div>
    <h2>${t('adm_build_h')}</h2>
    <div class="card">
      <div class="field"><label class="f">${t('adm_rhythm')}</label><textarea id="r_rhythm">${esc(r.rhythm_summary||'')}</textarea></div>
      <div class="field"><label class="f">${t('adm_sigsum')}</label><input type="text" id="r_sig" value="${esc(r.signal_quality_summary||'')}"></div>
      <div class="field"><label class="f">${t('adm_symcorr')}</label><textarea id="r_sym">${esc(r.symptom_correlation||'')}</textarea></div>
      <div class="field"><label class="f">${t('adm_comment')}</label><textarea id="r_comment">${esc(r.clinician_comment||'')}</textarea></div>
      <div class="field"><label class="f">${t('adm_recommend')}</label><select id="r_reco">${Object.keys(RECO_OPTS).map(k=>`<option value="${k}" ${r.recommendation===k?'selected':''}>${RECO_OPTS[k][lang]}</option>`).join('')}</select></div>
      <div class="field"><label class="f">${t('adm_signer')}</label><input type="text" id="r_signer" value="${esc(r.signed_by_name||'Dr Mahmood Ahmad')}"></div>
      <div id="signMsg"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn ghost" onclick="saveReport('${ep.id}',false)">Save draft</button><button class="btn" onclick="saveReport('${ep.id}',true)">${t('adm_sign')}</button></div>
    </div>
  </div>`;
}
function ecgRow(ep,u,i){
  return `<div class="list-row" style="align-items:flex-start;flex-wrap:wrap"><span class="badge-file">${(u.file_type||'ECG').toString().split('/').pop().slice(0,4).toUpperCase()}</span>
    <div style="flex:1;min-width:200px"><div><b>#${i+1}</b> ${esc(u.file_name)} ${u.red_flag_during_upload?`<span class="pill danger">${ico('flag',13)}</span>`:''}</div><div class="muted" style="font-size:.8rem">${fmtDateTime(u.recorded_at)} · ${u.symptoms_present?'symptomatic':'asymptomatic'} · ${symLabel(u.symptom_type)}</div>${u.patient_note?`<div class="muted" style="font-size:.82rem">📝 ${esc(u.patient_note)}</div>`:''}${ecgSVG()}</div>
    <div style="display:flex;flex-direction:column;gap:6px;min-width:175px"><select onchange="classify('${ep.id}','${u.id}','class',this.value)" style="font-size:.82rem;padding:6px 8px"><option value="">${t('adm_classify')}…</option>${Object.keys(CLASS_OPTS).map(k=>`<option value="${k}" ${u.clinician_classification===k?'selected':''}>${CLASS_OPTS[k][lang]}</option>`).join('')}</select><select onchange="classify('${ep.id}','${u.id}','qual',this.value)" style="font-size:.82rem;padding:6px 8px"><option value="">${t('adm_quality')}…</option>${Object.keys(QUAL_OPTS).map(k=>`<option value="${k}" ${u.signal_quality===k?'selected':''}>${QUAL_OPTS[k][lang]}</option>`).join('')}</select></div></div>`;
}
function classify(epId,uId,which,val){ const ep=DB.episodes.find(e=>e.id===epId); if(!ep)return; const u=ep.uploads.find(x=>x.id===uId); if(!u)return; if(which==='class')u.clinician_classification=val||null; else u.signal_quality=val||null; u.reviewed_at=nowISO(); if(ep.status==='AWAITING_REVIEW')ep.status='IN_REVIEW'; save(); }
function escalate(epId){ const ep=DB.episodes.find(e=>e.id===epId); if(!ep)return; ep.status='ESCALATED'; ep.escalated=true; save(); render(); }
function assignQA(epId){ const ep=DB.episodes.find(e=>e.id===epId); if(!ep)return; ep.qa_assigned=true; ep.qa_type=ep.escalated?'ESCALATION':'RANDOM_10_PERCENT'; save(); render(); }
function qaLabel(x){ return {RANDOM_10_PERCENT:'Random 10% sample',ESCALATION:'Escalation review',TECHNICAL_REVIEW:'Technical review'}[x]||x; }
function saveReport(epId,sign){
  const ep=DB.episodes.find(e=>e.id===epId); if(!ep)return; const v=id=>document.getElementById(id).value; ep.report=ep.report||{};
  Object.assign(ep.report,{number_of_ecgs_reviewed:ep.uploads.length,rhythm_summary:v('r_rhythm'),signal_quality_summary:v('r_sig'),symptom_correlation:v('r_sym'),clinician_comment:v('r_comment'),recommendation:v('r_reco'),signed_by_name:v('r_signer'),limitations_statement:t('limitation')});
  if(sign){ ep.report.signed_at=nowISO(); ep.status='REPORT_READY'; document.getElementById('signMsg').innerHTML=`<div class="note good" style="margin-bottom:12px">${t('adm_signed')}</div>`; }
  save(); if(sign) setTimeout(()=>render(),700);
}
function seedDemo(){
  const samples=[{country:'UAE',age:54,sex:'male',sym:'palpitations',amt:35,n:6,flag:false},{country:'Saudi Arabia',age:39,sex:'female',sym:'irregular_heartbeat',amt:80,n:14,flag:false},{country:'Qatar',age:67,sex:'male',sym:'wearable_alert',amt:120,n:3,flag:true},{country:'Kuwait',age:28,sex:'female',sym:'palpitations',amt:5,n:9,flag:false}];
  samples.forEach((s,idx)=>{
    const start=addDays(nowISO(),-(idx+1)); const uploads=[];
    for(let i=0;i<s.n;i++){ const isFlag=s.flag&&i===1; uploads.push({id:uid('ecg'),file_name:`ecg_${i+1}.pdf`,file_type:'pdf',file_size_bytes:240000,recorded_at:addDays(start,i*0.3),symptoms_present:i%2===0,symptom_type:isFlag?'chest_discomfort':(i%2===0?'palpitations':'none'),patient_note:i===0?'felt fluttering after coffee':'',signal_quality:null,clinician_classification:null,red_flag_during_upload:isFlag,reviewed_at:null,created_at:start}); }
    DB.episodes.push({id:uid('ep'),user_id:'demo',eligibility:{id:uid('elig'),country:s.country,age:s.age,sex:s.sex,main_symptom:s.sym,symptom_duration:'weeks',symptom_frequency:'intermittent',device_used:'KardiaMobile',known_heart_condition:false,current_medications:'',symptom_description:'',red_flags:Array(8).fill('no'),eligible:true,routing_tag:'ELIGIBLE_DIARY',created_at:start},status:s.flag?'ESCALATED':'AWAITING_REVIEW',payment_status:'paid',selected_amount_gbp:s.amt,stripe_payment_intent_id:'pi_demo_'+idx,diary_start_at:start,diary_end_at:addDays(start,CFG.DIARY_DAYS),max_uploads:CFG.MAX_UPLOADS,uploads,report:null,escalated:s.flag,red_flag:s.flag,qa_assigned:false,created_at:start});
    DB.monthlyUploads+=s.n;
  });
  DB.monthlyUploads=Math.min(DB.monthlyUploads,CFG.MONTHLY_CAP); save(); render();
}
